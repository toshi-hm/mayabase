name: 動画データの定期更新

on:
  schedule:
    # 毎日 21:00 UTC(日本時間 6:00)
    - cron: "0 21 * * *"
  workflow_dispatch:

concurrency:
  group: update-videos
  cancel-in-progress: false

# 注意: main にブランチ保護(直接 push 禁止)を設定する場合は
# github-actions[bot] を除外するか、PR ベースのフローに変更してください
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: 依存関係のインストール
        run: bun install --frozen-lockfile

      - name: YouTube 動画データの取得
        # YOUTUBE_API_KEY(リポジトリ Secrets)を設定すると Data API で全動画を取得する。
        # 未設定でも RSS(最新 15 件)で動作する(段階的に過去動画が蓄積される)。
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: bun run fetch

      - name: 変更があればコミット
        run: |
          if git diff --quiet src/data/videos.json; then
            echo "変更なし"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/videos.json
          git commit -m "chore: 動画データを自動更新"
          # 実行中に main へ別コミットが入った場合に備えてリベースしてから push
          git fetch origin main
          git rebase origin/main
          git push
