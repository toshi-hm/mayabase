name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: 依存関係のインストール
        run: bun install --frozen-lockfile

      - name: Lint(Biome)
        run: bun run lint

      - name: Format チェック(Prettier / Biome)
        run: bun run format:check

      - name: 型チェック(astro check)
        run: bun run check

      - name: テスト
        run: bun test

      - name: ビルド
        run: bun run build

      - name: ビルド成果物のアップロード
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: dist/
          retention-days: 1

  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist/

      - name: Lighthouse CI(SEO=100 ほかを lighthouserc.json の assertion でゲート)
        run: npx --yes @lhci/cli@0.15.1 autorun

      - name: 失敗時に Lighthouse レポートをアップロード
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 7
