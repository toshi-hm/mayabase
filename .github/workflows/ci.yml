name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: 依存関係のインストール
        run: bun install --frozen-lockfile

      - name: Lint(Biome)
        run: bun run lint

      - name: Format チェック(Prettier / Biome)
        run: bun run format:check

      - name: 型チェック(astro check)
        run: bun run check

      - name: テスト
        run: bun test

      - name: ビルド
        run: bun run build
